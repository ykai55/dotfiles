name: Build clip release assets

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux x86_64 musl
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build
        working-directory: clip
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist/clip-linux-x86_64-musl
          cp clip/target/x86_64-unknown-linux-musl/release/clip dist/clip-linux-x86_64-musl/clip
          cp clip/target/x86_64-unknown-linux-musl/release/clip-history dist/clip-linux-x86_64-musl/clip-history
          tar -C dist/clip-linux-x86_64-musl -czf dist/clip-linux-x86_64-musl.tar.gz clip clip-history
          sha256sum dist/clip-linux-x86_64-musl.tar.gz > dist/clip-linux-x86_64-musl.tar.gz.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: clip-linux-x86_64-musl
          path: |
            dist/clip-linux-x86_64-musl.tar.gz
            dist/clip-linux-x86_64-musl.tar.gz.sha256

  build-macos:
    name: macOS aarch64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Rust CLI
        working-directory: clip
        run: cargo build --release

      - name: Build macOS helper
        working-directory: clip/helpers/macos/clip-macos-helper
        run: swift build -c release

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist/clip-macos-aarch64
          cp clip/target/release/clip dist/clip-macos-aarch64/clip
          cp clip/target/release/clip-history dist/clip-macos-aarch64/clip-history
          cp clip/helpers/macos/clip-macos-helper/.build/release/clip-macos-helper dist/clip-macos-aarch64/clip-macos-helper
          cp clip/helpers/macos/clip-macos-helper/.build/release/clip-history-menu dist/clip-macos-aarch64/clip-history-menu
          tar -C dist/clip-macos-aarch64 -czf dist/clip-macos-aarch64.tar.gz clip clip-history clip-macos-helper clip-history-menu
          shasum -a 256 dist/clip-macos-aarch64.tar.gz > dist/clip-macos-aarch64.tar.gz.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: clip-macos-aarch64
          path: |
            dist/clip-macos-aarch64.tar.gz
            dist/clip-macos-aarch64.tar.gz.sha256

  release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-macos
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: clip-latest
          name: clip-latest
          target_commitish: ${{ github.sha }}
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/clip-linux-x86_64-musl.tar.gz
            dist/clip-linux-x86_64-musl.tar.gz.sha256
            dist/clip-macos-aarch64.tar.gz
            dist/clip-macos-aarch64.tar.gz.sha256
